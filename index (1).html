<!DOCTYPE html>
<html>
<head>
<title>Smart Crop Yield Predictor - Gujarat Pro Plus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#133d6e,#1ab7ea);
    color:white;
    text-align:center;
}
.container{
    width:95%;
    margin:auto;
    padding:15px;
}
input,select{
    width:90%;
    padding:8px;
    margin:6px;
    border-radius:5px;
    border:none;
}
button{
    padding:10px 20px;
    background:#27ae60;
    color:white;
    border:none;
    border-radius:5px;
}
.output{
    margin-top:20px;
    background:#16a085;
    padding:15px;
    border-radius:10px;
}
canvas{
    background:white;
    border-radius:10px;
    margin-top:15px;
}
</style>
</head>

<body>

<h2>🌾 Smart Crop Yield Predictor - Gujarat Pro Plus</h2>

<div class="container">

<h3>🌍 Select Region (All over Gujarat)</h3>
<select id="region" onchange="autoFillRegion()">
<option value="">Select Gujarat Region</option>
<option value="south">South Gujarat</option>
<option value="north">North Gujarat</option>
<option value="saurashtra">Saurashtra</option>
<option value="kutch">Kutch</option>
<option value="central">Central Gujarat</option>
</select>

<h3>🌱 Crop & Environment Inputs</h3>

<select id="crop">
<option value="">Select Crop</option>
<option value="wheat">Wheat</option>
<option value="rice">Rice</option>
<option value="groundnut">Groundnut</option>
<option value="cotton">Cotton</option>
<option value="banana">Banana</option>
<option value="cumin">Cumin</option>
<option value="tur">Tur (Arhar)</option>
<option value="bajra">Bajra</option>
</select>

<input type="number" id="area" placeholder="Farm Area (hectares)">
<input type="number" id="ph" placeholder="Soil pH">

<select id="soil">
<option value="">Soil Type</option>
<option value="Loamy">Loamy</option>
<option value="Clay">Clay</option>
<option value="Sandy">Sandy</option>
</select>

<input type="number" id="rainfall" placeholder="Rainfall (mm/year)">
<input type="number" id="temp" placeholder="Temperature (°C)">
<input type="number" id="humidity" placeholder="Humidity (%)">

<select id="fertilizer">
<option value="">Fertilizer Type</option>
<option value="Organic">Organic</option>
<option value="NPK">NPK</option>
<option value="Urea">Urea</option>
</select>
<input type="number" id="fertQty" placeholder="Fertilizer Quantity (kg/hectare)">

<select id="irrigation">
<option value="">Irrigation Type</option>
<option value="Drip">Drip</option>
<option value="Sprinkler">Sprinkler</option>
<option value="Flood">Flood</option>
</select>

<input type="number" id="marketDistance" placeholder="Market Distance (km)">
<input type="number" id="seedQuality" placeholder="Seed Quality (1-5)">

<button onclick="predict()">Predict</button>

<div class="output" id="result" style="display:none;">

<h3>📊 OUTPUT</h3>
<p id="yield"></p>
<p id="profit"></p>
<p id="altCrop"></p>
<p id="success"></p>
<p id="marketDemand"></p>
<p id="risk"></p>
<p id="sustain"></p>
<p id="health"></p>

<canvas id="yieldChart"></canvas>

</div>

</div>

<script>

// Auto Fill Region Values
function autoFillRegion(){
    let region=document.getElementById("region").value;

    if(region=="south"){
        document.getElementById("rainfall").value=1500;
        document.getElementById("temp").value=30;
        document.getElementById("soil").value="Loamy";
    }
    if(region=="north"){
        document.getElementById("rainfall").value=600;
        document.getElementById("temp").value=38;
        document.getElementById("soil").value="Sandy";
    }
    if(region=="saurashtra"){
        document.getElementById("rainfall").value=750;
        document.getElementById("temp").value=34;
        document.getElementById("soil").value="Clay";
    }
    if(region=="kutch"){
        document.getElementById("rainfall").value=400;
        document.getElementById("temp").value=42;
        document.getElementById("soil").value="Sandy";
    }
    if(region=="central"){
        document.getElementById("rainfall").value=900;
        document.getElementById("temp").value=32;
        document.getElementById("soil").value="Loamy";
    }
}

// Alternative Crop Suggestion
function suggestCrop(rainfall){
    if(rainfall>1200) return "Rice, Sugarcane, Banana";
    else if(rainfall>700) return "Cotton, Groundnut, Maize";
    else return "Bajra, Cumin, Castor";
}

// Market Demand Info (dummy logic)
function marketDemand(crop){
    if(crop=="rice" || crop=="wheat") return "📈 High Demand";
    if(crop=="groundnut" || crop=="cotton") return "📊 Medium Demand";
    return "📉 Low Demand";
}

// Crop Health Info
function cropHealth(crop){
    if(crop=="wheat") return "🍞 Good for heart health & diabetes control.";
    if(crop=="rice") return "🍚 Easy digestion & energy.";
    if(crop=="groundnut") return "🥜 High protein & muscle nutrition.";
    if(crop=="banana") return "🍌 Good for digestion & BP control.";
    if(crop=="cumin") return "🌿 Helps digestion & immunity.";
    return "🌾 Crop info not available.";
}

let chart;

function predict(){

    let crop=document.getElementById("crop").value;
    let area=parseFloat(document.getElementById("area").value);
    let rainfall=parseFloat(document.getElementById("rainfall").value);
    let ph=parseFloat(document.getElementById("ph").value);
    let seed=parseFloat(document.getElementById("seedQuality").value);
    let marketD=parseFloat(document.getElementById("marketDistance").value);

    // Yield Formula (demo)
    let baseYield=(rainfall*0.02)+(seed*2);
    let totalYield=baseYield*area;

    // Profit
    let profit=(totalYield*2200) - (marketD*60);

    // Success Probability
    let success=(ph>=6 && ph<=7.5)?85:65;

    // Market Demand
    let md=marketDemand(crop);

    // Risk
    let risk="Normal";
    if(ph<5.5) risk="⚠ Low pH Risk";
    if(rainfall<500) risk="⚠ Drought Risk";

    // Sustainability Score
    let sustain=0;
    let fType=document.getElementById("fertilizer").value;
    if(fType=="Organic") sustain+=40;
    if(ph>=6 && ph<=7.5) sustain+=30;
    if(rainfall>700) sustain+=30;

    // Fill Output
    document.getElementById("yield").innerHTML="🌾 Predicted Yield: "+totalYield.toFixed(2)+" quintals";
    document.getElementById("profit").innerHTML="💰 Estimated Profit: ₹ "+profit.toFixed(2);
    document.getElementById("altCrop").innerHTML="🔄 Suggested Alternative Crops: "+suggestCrop(rainfall);
    document.getElementById("success").innerHTML="📈 Success Probability: "+success+"%";
    document.getElementById("marketDemand").innerHTML=md;
    document.getElementById("risk").innerHTML="⚠ Risk Alert: "+risk;
    document.getElementById("sustain").innerHTML="🌍 Sustainability Score: "+sustain+"/100";
    document.getElementById("health").innerHTML="🏥 Health Benefit: "+cropHealth(crop);

    document.getElementById("result").style.display="block";

    // Chart
    if(chart) chart.destroy();
    chart=new Chart(document.getElementById("yieldChart"),{
        type:"bar",
        data:{
            labels:["Yield","Profit"],
            datasets:[{
                label:"Analysis",
                data:[totalYield,profit]
            }]
        }
    });

}

</script>
</body>
</html>
